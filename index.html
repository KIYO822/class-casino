<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYAL CLASS CASINO - SOUND & CANCEL</title>
    <style>
        :root { --gold: #d4af37; --blue: #007bff; --red: #dc3545; --bg: #050505; }
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff; font-family: 'Impact', sans-serif; margin: 0; overflow: hidden; 
        }

        /* 管理者パネル */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(10,10,10,0.98); 
            padding: 15px; border-bottom: 2px solid var(--gold); z-index: 2000;
            display: none; flex-direction: column; align-items: center; font-family: sans-serif;
        }
        .admin-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .coin-list { max-height: 150px; overflow-y: auto; background: #000; padding: 10px; width: 90%; border: 1px solid #444; border-radius: 10px; }

        /* ゲームステージ */
        .game-slider { display: flex; width: 300vw; transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1); height: 100vh; }
        .game-page { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .game-title { 
            font-size: clamp(30px, 8vw, 60px); 
            background: linear-gradient(to bottom, #fff 20%, #d4af37 50%, #8a6d3b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;
        }

        .casino-stage { transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .zoom-L { transform: scale(1.6) translateX(18%); }
        .zoom-R { transform: scale(1.6) translateX(-18%); }

        .input-panel { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3);
            width: 90%; max-width: 420px; margin-bottom: 20px;
        }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; margin: 5px; }

        /* ボタン類 */
        .btn-draw { background: #28a745; color: #fff; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 10px; }
        .btn-cancel { background: #666; color: #fff; border: none; padding: 8px; cursor: pointer; font-size: 12px; border-radius: 5px; width: 100%; margin-top: 5px; display: none; }

        /* アリーナ */
        .arena { display: flex; gap: 20px; justify-content: center; width: 95%; }
        .team-card { flex: 1; max-width: 280px; background: #111; border: 1px solid #333; border-radius: 25px; padding: 15px; position: relative; min-height: 350px; }
        .winner-glow { border: 3px solid var(--gold) !important; box-shadow: 0 0 50px var(--gold); }
        .crown { position: absolute; top: -70px; left: 50%; transform: translateX(-50%); font-size: 80px; display: none; }

        .list-container { height: 250px; overflow-y: auto; border-top: 1px solid #333; margin-top: 10px; font-family: sans-serif; font-size: 13px; }
        .bet-row { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #1a1a1a; }

        .nav-btn { position: fixed; bottom: 30px; background: rgba(212,175,55,0.1); color: gold; border: 1px solid gold; padding: 10px 20px; cursor: pointer; z-index: 500; border-radius: 50px; }
        .btn-left { left: 15px; }
        .btn-right { right: 15px; }
        .admin-toggle { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); opacity: 0.1; cursor: pointer; z-index: 3000; font-size: 24px; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        .result-card { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 30px; text-align: center; width: 400px; }
    </style>
</head>
<body>

<div id="admin-panel">
    <h3>👑 ADMIN CONTROL</h3>
    <div class="admin-row">
        見出し: <input type="text" id="adm-title">
        BLUE倍率: <input type="number" id="adm-odds-L" step="0.1">
        RED倍率: <input type="number" id="adm-odds-R" step="0.1">
    </div>
    <div class="admin-row">
        勝敗操作: <select id="adm-winner"><option value="random">ランダム</option><option value="L">BLUE勝</option><option value="R">RED勝</option></select>
        <button onclick="applySettings()" style="background:gold; font-weight:bold; cursor:pointer;">保存反映</button>
        <button onclick="resetAllData()" style="background:#ff4444; color:white; border:none;">全消去</button>
    </div>
    <div id="coin-manager" class="coin-list"></div>
    <button onclick="toggleAdmin()" style="margin-top:10px;">閉じる</button>
</div>

<div class="admin-toggle" onclick="toggleAdmin()">⚙</div>
<div class="game-slider" id="slider"></div>

<button class="nav-btn btn-left" onclick="slide(-1)">PREV</button>
<button class="nav-btn btn-right" onclick="slide(1)">NEXT</button>

<div id="overlay">
    <div class="result-card">
        <h1 id="res-win-msg"></h1>
        <div id="res-list" style="text-align:left; max-height:250px; overflow-y:auto; margin:20px 0; font-family:sans-serif;"></div>
        <button onclick="closeResult()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; border-radius:10px;">NEXT ROUND</button>
    </div>
</div>

<!-- 音声ファイル -->
<audio id="sound-coin" src="https://assets.mixkit.co"></audio>

<script>
    let players = JSON.parse(localStorage.getItem('casino_p')) || {}; 
    let gameSettings = JSON.parse(localStorage.getItem('casino_s')) || [
        { title: "ROUND 1", oddsL: 2.0, oddsR: 2.0 },
        { title: "ROUND 2", oddsL: 3.0, oddsR: 1.5 },
        { title: "FINAL", oddsL: 10.0, oddsR: 10.0 }
    ];
    let currentBets = JSON.parse(localStorage.getItem('casino_b')) || []; 
    let currentIdx = parseInt(localStorage.getItem('casino_idx')) || 0;
    let drawTimer = null;

    function saveData() {
        localStorage.setItem('casino_p', JSON.stringify(players));
        localStorage.setItem('casino_s', JSON.stringify(gameSettings));
        localStorage.setItem('casino_b', JSON.stringify(currentBets));
        localStorage.setItem('casino_idx', currentIdx);
    }

    function init() {
        const slider = document.getElementById('slider');
        slider.innerHTML = "";
        gameSettings.forEach((gs, i) => {
            slider.innerHTML += `
                <div class="game-page" id="page-${i}">
                    <div class="game-title">${gs.title}</div>
                    <div class="input-panel" id="input-ui-${i}">
                        <input type="text" id="name-${i}" placeholder="PLAYER NAME">
                        <input type="number" id="bet-${i}" placeholder="BET" style="width:80px;">
                        <select id="side-${i}"><option value="L">BLUE</option><option value="R">RED</option></select>
                        <button onclick="addBet(${i})" style="padding:10px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; border-radius:8px;">BET</button>
                        <button id="start-${i}" class="btn-draw" style="display:${currentBets.length > 0 ? 'block' : 'none'};" onclick="startDrawSequence(${i})">DRAW START</button>
                        <button id="cancel-${i}" class="btn-cancel" onclick="cancelDraw(${i})">やっぱりやめる（戻る）</button>
                    </div>
                    <div class="arena">
                        <div id="card-L-${i}" class="team-card"><div class="crown" id="crown-L-${i}">👑</div><h2 style="color:var(--blue);text-align:center;">BLUE<br><small>x${gs.oddsL}</small></h2><div id="list-L-${i}" class="list-container"></div></div>
                        <div id="card-R-${i}" class="team-card"><div class="crown" id="crown-R-${i}">👑</div><h2 style="color:var(--red);text-align:center;">RED<br><small>x${gs.oddsR}</small></h2><div id="list-R-${i}" class="list-container"></div></div>
                    </div>
                </div>`;
        });
        updateAdminCoinList();
        updateArena(currentIdx);
        slide(0);
    }

    function addBet(idx) {
        const name = document.getElementById(`name-${idx}`).value.trim();
        const bet = parseInt(document.getElementById(`bet-${idx}`).value);
        const side = document.getElementById(`side-${idx}`).value;
        if(!name || isNaN(bet) || bet <= 0) return;
        if(!players[name]) players[name] = 1000;
        if(players[name] < bet) return alert("枚数不足");
        currentBets.push({ name, bet, side });
        document.getElementById(`name-${idx}`).value = "";
        document.getElementById(`bet-${idx}`).value = "";
        updateArena(idx);
        document.getElementById(`start-${idx}`).style.display = "block";
        saveData();
    }

    function startDrawSequence(idx) {
        document.getElementById(`start-${idx}`).style.display = "none";
        document.getElementById(`cancel-${idx}`).style.display = "block";
        
        // 2秒間の猶予（この間にキャンセル可能）
        drawTimer = setTimeout(() => {
            document.getElementById(`cancel-${idx}`).style.display = "none";
            runGamble(idx);
        }, 2000);
    }

    function cancelDraw(idx) {
        clearTimeout(drawTimer);
        document.getElementById(`cancel-${idx}`).style.display = "none";
        document.getElementById(`start-${idx}`).style.display = "block";
    }

    function runGamble(idx) {
        const admWin = document.getElementById('adm-winner').value;
        const winSide = admWin === 'random' ? (Math.random() < 0.5 ? 'L' : 'R') : admWin;
        const page = document.getElementById(`page-${idx}`);
        
        page.classList.add(winSide === 'L' ? 'zoom-L' : 'zoom-R');
        document.getElementById(`card-${winSide}-${idx}`).classList.add('winner-glow');
        document.getElementById(`crown-${winSide}-${idx}`).style.display = "block";
        
        setTimeout(() => {
            document.getElementById('sound-coin').play();
            showResult(winSide, idx);
        }, 2000);
    }

    function showResult(winSide, idx) {
        const rate = winSide === 'L' ? gameSettings[idx].oddsL : gameSettings[idx].oddsR;
        const list = document.getElementById('res-list');
        list.innerHTML = "";
        document.getElementById('res-win-msg').innerText = (winSide==='L'?'BLUE':'RED') + " WIN!";
        document.getElementById('res-win-msg').style.color = (winSide==='L'?'var(--blue)':'var(--red)');

        currentBets.forEach(b => {
            const isWin = b.side === winSide;
            const payout = isWin ? Math.floor(b.bet * rate) : 0;
            players[b.name] += (payout - b.bet);
            list.innerHTML += `<div style="padding:8px; border-bottom:1px solid #333;"><strong>${b.name}</strong>: ${isWin?'WIN':'LOSE'} (${payout.toLocaleString()}枚)</div>`;
        });
        currentBets = [];
        saveData();
        document.getElementById('overlay').style.display = "flex";
    }

    function closeResult() {
        document.getElementById('overlay').style.display = "none";
        init();
    }

    function slide(dir) {
        currentIdx = Math.max(0, Math.min(gameSettings.length - 1, currentIdx + dir));
        document.getElementById('slider').style.transform = `translateX(-${currentIdx * 100}vw)`;
        saveData();
    }

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        document.getElementById('adm-title').value = gameSettings[currentIdx].title;
        document.getElementById('adm-odds-L').value = gameSettings[currentIdx].oddsL;
        document.getElementById('adm-odds-R').value = gameSettings[currentIdx].oddsR;
    }

    function applySettings() {
        gameSettings[currentIdx].title = document.getElementById('adm-title').value;
        gameSettings[currentIdx].oddsL = parseFloat(document.getElementById('adm-odds-L').value);
        gameSettings[currentIdx].oddsR = parseFloat(document.getElementById('adm-odds-R').value);
        saveData(); init(); toggleAdmin();
    }

    function resetAllData() { if(confirm("全消去？")) { localStorage.clear(); location.reload(); } }
    function updateArena(idx) {
        const lL = document.getElementById(`list-L-${idx}`), lR = document.getElementById(`list-R-${idx}`);
        if(!lL) return; lL.innerHTML = ""; lR.innerHTML = "";
        currentBets.forEach(b => {
            const row = `<div class="bet-row"><span>${b.name}</span><span>${b.bet}</span></div>`;
            b.side === 'L' ? lL.innerHTML += row : lR.innerHTML += row;
        });
    }
    function updateAdminCoinList() {
        const m = document.getElementById('coin-manager');
        m.innerHTML = Object.entries(players).map(([name, coin]) => `<div style="padding:3px; border-bottom:1px solid #222;">${name}: ${coin.toLocaleString()}枚</div>`).join("") || "参加者なし";
    }
    init();
</script>
</body>
</html>
