<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CUSTOM ODDS ROYAL CASINO</title>
    <style>
        :root { --gold: #d4af37; --blue: #007bff; --red: #dc3545; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Impact', sans-serif; margin: 0; overflow: hidden; }

        /* 管理者パネル（左右個別の倍率設定） */
        .admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(30,30,30,0.9); 
            padding: 8px; border-bottom: 1px solid var(--gold); z-index: 500;
            display: flex; justify-content: center; gap: 15px; align-items: center;
            font-family: sans-serif; font-size: 13px;
        }
        .admin-panel input { width: 50px; background: #000; color: gold; border: 1px solid #555; text-align: center; }

        .casino-stage { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); 
            padding-top: 40px;
        }
        .zoom-L { transform: scale(1.6) translateX(18%); }
        .zoom-R { transform: scale(1.6) translateX(-18%); }

        /* 入力パネル */
        .input-panel { background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--gold); box-shadow: 0 0 40px rgba(212,175,55,0.3); z-index: 100; text-align: center; width: 550px; margin-bottom: 20px; }
        .input-panel.hide { opacity: 0; pointer-events: none; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: #fff; font-size: 18px; margin: 5px; outline: none; }
        .btn-add { background: var(--gold); color: #000; font-weight: bold; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-start { background: #28a745; color: #fff; width: 100%; margin-top: 15px; padding: 15px; font-size: 22px; border: none; border-radius: 10px; cursor: pointer; display: none; }

        /* アリーナ */
        .arena { display: flex; gap: 40px; }
        .team-card { width: 320px; background: #111; border: 2px solid #333; border-radius: 25px; padding: 25px; position: relative; min-height: 400px; transition: 0.5s; }
        .winner-glow { border: 4px solid var(--gold) !important; box-shadow: 0 0 60px var(--gold); z-index: 50; }
        .loser-fade { opacity: 0.15; filter: grayscale(1); }
        .crown { position: absolute; top: -80px; left: 50%; transform: translateX(-50%); font-size: 90px; display: none; filter: drop-shadow(0 0 20px gold); animation: crownJump 0.6s infinite alternate; }
        @keyframes crownJump { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .odds-label { font-size: 24px; color: var(--gold); margin-bottom: 10px; }
        .list-container { height: 260px; overflow-y: auto; border-top: 1px solid #444; margin-top: 15px; font-family: sans-serif; }
        .bet-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 14px; }

        /* 結果画面 */
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .result-box { background: #111; border: 3px solid var(--gold); padding: 40px; border-radius: 30px; width: 500px; text-align: center; }
        .win-gold { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<!-- 管理者用パネル：左右の倍率と勝者を設定 -->
<div class="admin-panel">
    <span>【管理者】 BLUE倍率: <input type="number" id="adm-odds-L" value="2.0" step="0.1"></span>
    <span> RED倍率: <input type="number" id="adm-odds-R" value="2.0" step="0.1"></span>
    <span> 次の勝者: 
        <select id="adm-next-winner">
            <option value="random">ランダム</option>
            <option value="L">BLUE(左)勝</option>
            <option value="R">RED(右)勝</option>
        </select>
    </span>
    <button onclick="updateDisplayOdds()" style="font-size:10px; cursor:pointer;">倍率更新</button>
</div>

<div id="stage" class="casino-stage">
    <div class="input-panel" id="panel">
        <h1 style="color:var(--gold); margin:0;">ROYAL ARENA</h1>
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
            <input type="text" id="name" placeholder="名前を入力">
            <div style="display:flex; justify-content: center;">
                <input type="number" id="bet" placeholder="枚数" style="width:140px;">
                <select id="side">
                    <option value="L">BLUE TEAM</option>
                    <option value="R">RED TEAM</option>
                </select>
            </div>
            <button class="btn-add" onclick="addPlayer()">BETを追加</button>
        </div>
        <button id="start-btn" class="btn-start" onclick="runGamble()">🔥 抽選開始 🔥</button>
    </div>

    <div class="arena">
        <div id="card-L" class="team-card">
            <div id="crown-L" class="crown">👑</div>
            <h2 style="color:var(--blue); text-align:center;">BLUE</h2>
            <div id="disp-odds-L" class="odds-label">x2.0</div>
            <div id="list-L" class="list-container"></div>
        </div>

        <div id="card-R" class="team-card">
            <div id="crown-R" class="crown">👑</div>
            <h2 style="color:var(--red); text-align:center;">RED</h2>
            <div id="disp-odds-R" class="odds-label">x2.0</div>
            <div id="list-R" class="list-container"></div>
        </div>
    </div>
</div>

<div id="result-overlay">
    <div class="result-box">
        <h1 id="win-msg" style="font-size: 50px;"></h1>
        <p>Winning Payout: x<span id="res-rate"></span></p>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="final-list" style="text-align:left; max-height:300px; overflow-y:auto;"></div>
        <button onclick="resetGame()" style="margin-top:30px; width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; cursor:pointer; border-radius:10px;">次のゲームへ</button>
    </div>
</div>

<script>
    let players = [];

    function updateDisplayOdds() {
        document.getElementById('disp-odds-L').innerText = 'x' + parseFloat(document.getElementById('adm-odds-L').value).toFixed(1);
        document.getElementById('disp-odds-R').innerText = 'x' + parseFloat(document.getElementById('adm-odds-R').value).toFixed(1);
    }

    function addPlayer() {
        updateDisplayOdds();
        const n = document.getElementById('name'), b = document.getElementById('bet'), s = document.getElementById('side').value;
        if(!n.value || !b.value) return;
        players.push({ name: n.value, bet: parseInt(b.value), side: s });
        n.value = ""; b.value = "";
        updateArena();
        document.getElementById('start-btn').style.display = "block";
    }

    function updateArena() {
        const listL = document.getElementById('list-L'), listR = document.getElementById('list-R');
        listL.innerHTML = ""; listR.innerHTML = "";
        players.forEach(p => {
            const row = `<div class="bet-row"><span>${p.name}</span><span>${p.bet.toLocaleString()}</span></div>`;
            p.side === 'L' ? listL.innerHTML += row : listR.innerHTML += row;
        });
    }

    function runGamble() {
        document.getElementById('panel').classList.add('hide');
        const adminChoice = document.getElementById('adm-next-winner').value;
        const winSide = (adminChoice === 'random') ? (Math.random() < 0.5 ? 'L' : 'R') : adminChoice;

        setTimeout(() => {
            const stage = document.getElementById('stage');
            if(winSide === 'L') {
                stage.classList.add('zoom-L');
                document.getElementById('card-L').classList.add('winner-glow');
                document.getElementById('card-R').classList.add('loser-fade');
                document.getElementById('crown-L').style.display = "block";
            } else {
                stage.classList.add('zoom-R');
                document.getElementById('card-R').classList.add('winner-glow');
                document.getElementById('card-L').classList.add('loser-fade');
                document.getElementById('crown-R').style.display = "block";
            }
            setTimeout(() => showResult(winSide), 2500);
        }, 500);
    }

    function showResult(winSide) {
        // 当たったチーム側の倍率を取得
        const currentPayout = parseFloat(document.getElementById('adm-odds-' + winSide).value);
        const overlay = document.getElementById('result-overlay');
        overlay.style.display = "flex";
        document.getElementById('res-rate').innerText = currentPayout.toFixed(1);
        document.getElementById('win-msg').innerText = (winSide === 'L' ? "BLUE" : "RED") + " WIN!";
        document.getElementById('win-msg').style.color = (winSide === 'L' ? "var(--blue)" : "var(--red)");

        let html = "";
        players.forEach(p => {
            const isWin = (p.side === winSide);
            const amt = isWin ? p.bet * currentPayout : 0;
            html += `<div style="padding:8px; border-bottom:1px solid #222;">
                ${p.name}: <span class="${isWin?'win-gold':''}">${isWin?'WIN':'LOSE'}</span> (${amt.toLocaleString()}枚)
            </div>`;
        });
        document.getElementById('final-list').innerHTML = html;
    }

    function resetGame() {
        players = [];
        document.getElementById('result-overlay').style.display = "none";
        document.getElementById('panel').classList.remove('hide');
        document.getElementById('stage').className = "casino-stage";
        ['L','R'].forEach(s => {
            document.getElementById(`card-${s}`).className = "team-card";
            document.getElementById(`crown-${s}`).style.display = "none";
            document.getElementById(`list-${s}`).innerHTML = "";
        });
        document.getElementById('start-btn').style.display = "none";
        updateDisplayOdds();
    }
</script>
</body>
</html>
